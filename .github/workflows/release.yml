name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          name = project["name"]
          version = project["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if name != "moodle-cli":
              raise SystemExit(f"Refusing to release unexpected package name: {name}")
          if tag != expected:
              raise SystemExit(f"Tag {tag} does not match package version {expected}")
          print(f"Validated release tag {tag} for {name}")
          PY

      - name: Build package
        run: uv build

      - name: Resolve release notes file
        id: notes
        run: |
          notes_file="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ -f "${notes_file}" ]; then
            echo "has_manual_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"
          else
            echo "has_manual_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release with manual notes
        if: steps.notes.outputs.has_manual_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            dist/*.tar.gz
            dist/*.whl

      - name: Publish GitHub release with generated notes
        if: steps.notes.outputs.has_manual_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
